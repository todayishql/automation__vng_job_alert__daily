name: Scrape VNG Jobs

on:
  schedule:
    - cron: "0 1 * * *" 
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape-vng-jobs
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python scraper/scrape.py

      - name: Build leaderboard image
        run: python scraper/make_leaderboard.py

      - name: Notify Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scraper/notify_telegram.py

      - name: Commit data + leaderboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.csv data/leaderboard.png
          if [[ -n "$(git status --porcelain data/)" ]]; then
            git commit -m "chore: update VNG jobs + leaderboard ($(date -u +%Y-%m-%d))"
            git push
          else
            echo "No changes to commit."
          fi
